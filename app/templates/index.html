<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מנוע טופס הצעה — הפניקס</title>
  <link rel="stylesheet" href="/static/styles.css?v={{ asset_version }}">
</head>
<body>
  <main class="wrap">
    <section class="card hero">
      <div>
        <div class="badge">GitHub + Render</div>
        <h1>מעלה דוח תפעולי → מקבל טופס חברה ממולא</h1>
        <p>מעלה PDF של דוח תפעולי, והמנוע מחלץ נתונים ומחזיר טופס הפניקס ממולא.</p>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>1. העלאת קובץ</h2>
        <form id="uploadForm" novalidate>
          <label class="upload">
            <span>בחר דוח תפעולי PDF</span>
            <input type="file" id="fileInput" name="file" accept="application/pdf" required>
          </label>
          <div class="actions">
            <button type="button" id="parseBtn">בדיקת חילוץ נתונים</button>
            <button type="submit" class="primary" id="generateBtn">הפק והורד PDF ממולא</button>
          </div>
        </form>
        <div id="status" class="status"></div>
      </div>

      <div class="card">
        <h2>2. תצוגת חילוץ</h2>
        <pre id="output">כאן תופיע תצוגת הנתונים שנשלפו.</pre>
      </div>
    </section>
  </main>
  <script src="/static/app.js?v={{ asset_version }}"></script>
</body>
</html>
